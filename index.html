<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>D3LI | Coming Soon</title>

  <meta
    name="description"
    content="D3LI is coming soon. Scan. Play. Survive."
  />

  <meta name="theme-color" content="#050505" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #050505;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050505;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%);

      width: min(560px, calc(100% - 30px));
      padding: 16px 22px;

      text-align: center;

      background: rgba(7, 7, 8, 0.9);
      border: 1px solid rgba(214, 180, 106, 0.55);
      border-radius: 14px;

      box-shadow:
        0 16px 45px rgba(0, 0, 0, 0.65),
        0 0 20px rgba(133, 78, 205, 0.12);

      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .message h1 {
      color: #d6b46a;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(16px, 3vw, 22px);
      letter-spacing: 3px;
    }

    .message p {
      margin-top: 8px;
      color: #eee8df;
      font-size: clamp(11px, 2vw, 14px);
      line-height: 1.5;
    }

    .message .tagline {
      margin-top: 10px;
      color: #a76cff;
      font-size: clamp(9px, 1.8vw, 11px);
      font-weight: 700;
      letter-spacing: 3px;
    }

    @media (max-width: 600px) {
      .page {
        padding-bottom: 118px;
      }

      .page img {
        height: calc(100svh - 118px);
      }

      .message {
        bottom: max(14px, env(safe-area-inset-bottom));
        padding: 14px 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img
      src="./d3li-preview.jpeg?v=20260722"
      alt="D3LI game preview"
    />

    <section class="message">
      <h1>YOUR JOURNEY BEGINS SOON</h1>

      <p>
        The full D3LI experience will be available in the app soon.
      </p>

      <div class="tagline">
        SCAN • PLAY • SURVIVE
      </div>
    </section>
  </main>
</body>
</html>
