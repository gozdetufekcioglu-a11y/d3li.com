<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d3li - Draw Your Card. Write Your Path.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [UYGULAMA KASASI] Tasarımı 1536x1024 piksel sabit oranına kilitler ve ekrana göre scale eder */
        .app-container {
            position: relative;
            width: 1536px;
            height: 1024px;
            background-image: url('bg.jpeg'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            transform-origin: center;
            flex-shrink: 0;
        }

        /* Sol Alt Büyük %87 Sayacı */
        .system-status-mask {
            position: absolute;
            top: 641px; 
            left: 514px;
            width: 154px;
            height: 92px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            z-index: 6;
        }

        .system-status-percentage {
            font-size: 54px;
            font-weight: 900;
            color: #39ff14;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.8);
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* Alt Progress Bar */
        .progress-mask-container {
            position: absolute;
            top: 820px; 
            left: 91px;
            width: 502px; 
            height: 18px;
            overflow: hidden;
            z-index: 6;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #103f10, #39ff14);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.9);
            transition: width 0.04s linear;
        }

        /* Sağdaki Küçük Yüzde Maskesi */
        .progress-percentage-mask {
            position: absolute;
            top: 814px;
            left: 677px;
            width: 61px;
            height: 31px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            z-index: 6;
        }

        .progress-percentage {
            color: #39ff14;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
        }

        /* GÖRSELDEKİ ÇERÇEVENİN PİKSEL ÖLÇÜLERİNE TAM OTURAN DİNAMİK ALAN */
        .cyber-dynamic-panel {
            position: absolute;
            top: 518px;    /* Üst çizgi pikseli */
            left: 91px;    /* Sol çizgi pikseli */
            width: 584px;  /* Tam çerçeve genişliği */
            height: 263px; /* Tam çerçeve yüksekliği */
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 10;
        }

        /* Canlı Terminal Satırları */
        .log-line {
            color: #39ff14;
            font-size: 14px;
            margin-top: 15px;
            margin-left: 20px;
            margin-right: 20px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            display: none;
            justify-content: space-between;
        }

        .log-status {
            font-weight: bold;
        }

        /* SARI POP-UP: Çerçevenin sınırlarına pikseli pikseline sıfır yapışır */
        .system-standby-content {
            display: none;
            text-align: center;
            width: 100%;
            height: 100%;
            background-color: #050c05; 
            border: 2px solid #ffcc00;  
            padding: 45px 30px;
        }

        .standby-header {
            color: #ffcc00;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
        }

        .standby-desc {
            color: #88af88;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .join-btn {
            background-color: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .join-btn:hover {
            background-color: #39ff14;
            color: #000;
            box-shadow: 0 0 15px #39ff14;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app-canvas">
        
        <div class="system-status-mask">
            <div class="system-status-percentage" id="status-num">0%</div>
        </div>

        <div class="progress-mask-container">
            <div class="progress-bar" id="fill-bar"></div>
        </div>

        <div class="progress-percentage-mask">

        <div class="cyber-dynamic-panel">

                <button class="join-btn" onclick="window.open('https://discord.gg/d3licom', '_blank')">JOIN COMMUNITY</button>
            </div>

        </div>
    </div>

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const baseWidth = 1536;
            const baseHeight = 1024;
            
            const scaleX = windowWidth / baseWidth;
            const scaleY = windowHeight / baseHeight;
            const scale = Math.min(scaleX, scaleY);
            
            canvas.style.transform = `scale(${scale})`;
        }
