<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>D3LI | Scan. Play. Survive.</title>

<meta name="description" content="D3LI - Scan. Play. Survive. The Coffee Adventure Game." />
<meta name="keywords" content="d3li, coffee game, tarot game, mobile game, qr game" />
<meta name="author" content="D3LI" />
<meta name="theme-color" content="#0f0f0f" />

<meta property="og:title" content="D3LI" />
<meta property="og:description" content="Scan. Play. Survive." />
<meta property="og:type" content="website" />
<meta property="og:image" content="home.jpg" />

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

background:#090909;

font-family:'Inter',sans-serif;

overflow:hidden;

}

body{

display:flex;
justify-content:center;
align-items:center;

}

/* Loading */

#loader{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:#090909;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:9999;

transition:1s;

}

.logo{

font-family:'Cinzel',serif;

font-size:58px;

color:#d7b26a;

letter-spacing:8px;

animation:pulse 2s infinite;

}

.loading{

margin-top:20px;

font-size:14px;

letter-spacing:4px;

color:#888;

}

@keyframes pulse{

0%{opacity:.4;}

50%{opacity:1;}

100%{opacity:.4;}

}

/* Main */

main{

position:relative;

width:100vw;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

/* Image */

main img{

width:100%;

height:100%;

object-fit:contain;

user-select:none;

pointer-events:none;

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;
transform:scale(1.03);

}

to{

opacity:1;
transform:scale(1);

}

}

/* Top Logo */

.title{

position:absolute;

top:35px;

left:50%;

transform:translateX(-50%);

font-family:'Cinzel',serif;

font-size:54px;

font-weight:bold;

color:#d6b46d;

letter-spacing:8px;

text-shadow:

0 0 20px rgba(255,208,120,.3);

}

/* Subtitle */

.subtitle{

position:absolute;

top:105px;

left:50%;

transform:translateX(-50%);

font-size:14px;

letter-spacing:8px;

color:#b78cff;

text-transform:uppercase;

}

/* Coming Soon */

.coming{

position:absolute;

bottom:80px;

left:50%;

transform:translateX(-50%);

font-size:14px;

letter-spacing:5px;

color:#d8b26b;

background:rgba(0,0,0,.45);

padding:12px 28px;

border:1px solid rgba(214,180,109,.35);

backdrop-filter:blur(8px);

border-radius:10px;

}

/* Footer */

footer{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:12px;

letter-spacing:2px;

color:#666;

}

/* Responsive */

@media(max-width:768px){

.title{

font-size:34px;

letter-spacing:4px;

}

.subtitle{

font-size:11px;

letter-spacing:3px;

top:82px;

}

.coming{

font-size:12px;

padding:10px 20px;

}

main img{

object-fit:contain;

}

}

</style>

</head>

<body>

<div id="loader">

<div class="logo">
d3li
</div>

<div class="loading">
LOADING...
</div>

</div>

<main>

<div class="title">
D3LI
</div>

<div class="subtitle">
SCAN • PLAY • SURVIVE
</div>

<img src="home.jpg" alt="D3LI Game">

<div class="coming">
COMING SOON
</div>

<footer>

© 2026 D3LI

</footer>

</main>

<script>

window.onload=function(){

setTimeout(function(){

document.getElementById("loader").style.opacity="0";

setTimeout(function(){

document.getElementById("loader").style.display="none";

},900);

},1800);

}

</script>

</body>
</html>
