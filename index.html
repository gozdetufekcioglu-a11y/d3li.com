<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>d3li - Draw Your Card. Write Your Path.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* [MOBİL KASA] Sadece arka plan görselini dikey ekrana oturtan alan */
        .phone-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 480px; 
            max-height: 920px;
            background-image: url('bg.jpeg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* [HAREKETLİ POP-UP] Ekranın tam ortasında, hafif küçülerek açılan estetik siber kutu */
        .system-standby-content {
            display: none;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7); 
            width: 88vw;
            max-width: 380px;
            background-color: rgba(5, 12, 5, 0.98); 
            border: 2px solid #ffcc00;  
            padding: 25px 20px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
            border-radius: 6px;
            z-index: 99999;
            font-family: 'Courier New', Courier, monospace;
            opacity: 0;
            animation: popUpEntrance 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }

        .standby-header {
            color: #ffcc00;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
        }

        .standby-desc {
            color: #88af88;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .join-btn {
            background-color: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .join-btn:hover, .join-btn:active {
            background-color: #39ff14;
            color: #000;
            box-shadow: 0 0 15px #39ff14;
        }

        /* Pop-up Giriş Animasyonu */
        @keyframes popUpEntrance {
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1); 
            }
        }
    </style>
</head>
<body>

    <div class="phone-container">

        <div class="system-standby-content" id="standby-screen">
            <div class="standby-header">⚠️ CONNECTION LOST // SYSTEM STANDBY</div>
            <div class="standby-desc">Tarot servers are currently under active development. d3li has not opened its gates yet.</div>
            <button class="join-btn" onclick="window.open('https://discord.gg/d3licom', '_blank')">JOIN COMMUNITY</button>
        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const standbyScreen = document.getElementById('standby-screen');

            // Sayfa açıldıktan 600ms sonra sarı kutu ekranın tam ortasında pürüzsüzce açılır
            setTimeout(() => {
                standbyScreen.style.display = 'block';
            }, 600);
        });
    </script>
</body>
</html>
