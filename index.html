<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D3LI | Coming Soon</title>

<meta name="description" content="The D3LI mobile experience is coming soon.">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;

background:#050505;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

}

body{

display:flex;
justify-content:center;
align-items:center;

}

#loader{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#050505;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:9999;

transition:1s;

}

#logo{

font-size:70px;

color:#d6b36a;

font-weight:bold;

letter-spacing:10px;

font-family:Georgia;

animation:pulse 1.6s infinite;

}

#tag{

margin-top:15px;

color:#9d62ff;

letter-spacing:6px;

font-size:13px;

}

@keyframes pulse{

0%{opacity:.4;}

50%{opacity:1;}

100%{opacity:.4;}

}

main{

position:relative;

width:100vw;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#050505;

}

main img{

width:100%;

height:100%;

object-fit:contain;

display:block;

}

.message{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

width:min(560px,90%);

background:rgba(10,10,10,.88);

border:1px solid rgba(214,180,106,.4);

border-radius:15px;

padding:18px;

backdrop-filter:blur(8px);

text-align:center;

}

.message h2{

color:#d6b36a;

font-family:Georgia;

font-size:28px;

margin-bottom:10px;

letter-spacing:2px;

}

.message p{

color:#efefef;

font-size:15px;

line-height:24px;

}

.message span{

display:block;

margin-top:12px;

color:#9d62ff;

letter-spacing:5px;

font-size:12px;

font-weight:bold;

}

@media(max-width:768px){

#logo{

font-size:46px;

}

#tag{

font-size:10px;

letter-spacing:3px;

}

.message h2{

font-size:22px;

}

.message p{

font-size:13px;

line-height:20px;

}

}

</style>

</head>

<body>

<div id="loader">

<div id="logo">

D3LI

</div>

<div id="tag">

SCAN • PLAY • SURVIVE

</div>

</div>

<main>

<img
id="preview"
src="d3li-preview.jpeg"
alt="D3LI Preview"

onerror="this.src='https://raw.githubusercontent.com/gozdetufekcioglu-a11y/d3li.com/main/d3li-preview.jpeg';"

>

<div class="message">

<h2>

YOUR JOURNEY BEGINS SOON

</h2>

<p>

The complete D3LI mobile adventure is currently in development.

Stay tuned for the official launch.

</p>

<span>

SCAN • PLAY • SURVIVE

</span>

</div>

</main>

<script>

window.onload=function(){

setTimeout(function(){

document.getElementById("loader").style.opacity="0";

setTimeout(function(){

document.getElementById("loader").style.display="none";

},900);

},1800);

}

</script>

</body>

</html>
