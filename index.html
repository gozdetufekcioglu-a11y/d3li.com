<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>D3LI | Coming Soon</title>

  <meta
    name="description"
    content="D3LI is coming soon. Scan. Play. Survive."
  >

  <meta name="theme-color" content="#070707">

  <meta property="og:title" content="D3LI">
  <meta property="og:description" content="Scan. Play. Survive. Coming soon to the app.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://d3li.com/bg.jpeg">

  <style>
    :root {
      --background: #070707;
      --gold: #d7b46a;
      --purple: #a66cff;
      --soft-white: #eee8df;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--background);
    }

    body {
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Loading screen */

    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        radial-gradient(
          circle at center,
          #18121f 0%,
          #090909 45%,
          #050505 100%
        );

      transition:
        opacity 0.8s ease,
        visibility 0.8s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      text-align: center;
    }

    .loader-logo {
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 9vw, 86px);
      font-weight: 700;
      letter-spacing: 12px;
      line-height: 1;

      text-shadow:
        0 0 18px rgba(215, 180, 106, 0.24),
        0 0 42px rgba(166, 108, 255, 0.16);

      animation: logoPulse 1.7s ease-in-out infinite;
    }

    .loader-tagline {
      margin-top: 22px;

      color: var(--purple);
      font-size: clamp(10px, 2vw, 13px);
      font-weight: 700;
      letter-spacing: clamp(4px, 1vw, 8px);

      white-space: nowrap;
    }

    .loader-line {
      position: relative;

      width: min(220px, 65vw);
      height: 3px;

      margin-top: 34px;

      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .loader-line::after {
      content: "";

      position: absolute;
      inset: 0;

      width: 45%;
      border-radius: inherit;

      background: linear-gradient(
        90deg,
        transparent,
        var(--purple),
        var(--gold),
        transparent
      );

      animation: loadingLine 1.3s ease-in-out infinite;
    }

    .loader-status {
      margin-top: 16px;

      color: rgba(238, 232, 223, 0.55);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
    }

    @keyframes logoPulse {
      0%,
      100% {
        opacity: 0.55;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes loadingLine {
      from {
        transform: translateX(-130%);
      }

      to {
        transform: translateX(280%);
      }
    }

    /* Main page */

    .app-preview {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 100svh;

      padding: 18px;

      overflow: hidden;
      background: #050505;
    }

    .app-preview::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at 50% 25%,
          rgba(117, 65, 177, 0.16),
          transparent 38%
        );

      pointer-events: none;
    }

    .game-artwork {
      position: relative;
      z-index: 1;

      display: block;

      width: auto;
      max-width: 100%;
      height: auto;
      max-height: calc(100svh - 36px);

      object-fit: contain;

      opacity: 0;
      transform: scale(1.025);

      filter:
        drop-shadow(0 18px 50px rgba(0, 0, 0, 0.72));

      transition:
        opacity 1.1s ease,
        transform 1.1s ease;
    }

    body.loaded .game-artwork {
      opacity: 1;
      transform: scale(1);
    }

    .coming-soon {
      position: fixed;
      z-index: 10;

      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));

      width: min(540px, calc(100% - 32px));

      padding: 16px 22px;

      transform: translateX(-50%);

      border: 1px solid rgba(215, 180, 106, 0.52);
      border-radius: 14px;

      background: rgba(8, 8, 9, 0.88);
      backdrop-filter: blur(13px);
      -webkit-backdrop-filter: blur(13px);

      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.62),
        0 0 22px rgba(166, 108, 255, 0.09);

      text-align: center;

      opacity: 0;
      transform:
        translateX(-50%)
        translateY(18px);

      transition:
        opacity 0.9s ease 0.3s,
        transform 0.9s ease 0.3s;
    }

    body.loaded .coming-soon {
      opacity: 1;

      transform:
        translateX(-50%)
        translateY(0);
    }

    .coming-soon-title {
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(15px, 3vw, 20px);
      font-weight: 700;
      letter-spacing: 3px;
    }

    .coming-soon-text {
      margin-top: 7px;

      color: var(--soft-white);
      font-size: clamp(11px, 2vw, 14px);
      line-height: 1.45;
      letter-spacing: 0.4px;
    }

    .coming-soon-tagline {
      margin-top: 9px;

      color: var(--purple);
      font-size: clamp(9px, 1.8vw, 11px);
      font-weight: 700;
      letter-spacing: 3px;
    }

    @media (max-width: 600px) {
      .app-preview {
        padding:
          10px
          10px
          calc(132px + env(safe-area-inset-bottom));
      }

      .game-artwork {
        max-height:
          calc(
            100svh -
            152px -
            env(safe-area-inset-bottom)
          );
      }

      .coming-soon {
        padding: 14px 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="loader" aria-label="Loading D3LI">
    <div class="loader-content">
      <div class="loader-logo">D3LI</div>

      <div class="loader-tagline">
        SCAN • PLAY • SURVIVE
      </div>

      <div class="loader-line"></div>

      <div class="loader-status">
        ENTERING THE WORLD...
      </div>
    </div>
  </div>

  <main class="app-preview">
    <img
      id="gameArtwork"
      class="game-artwork"
      src="bg.jpeg"
      alt="D3LI mobile game preview"
    >

    <section class="coming-soon">
      <h1 class="coming-soon-title">
        YOUR JOURNEY BEGINS SOON
      </h1>

      <p class="coming-soon-text">
        The full D3LI game experience will soon be available in the app.
      </p>

      <p class="coming-soon-tagline">
        SCAN • PLAY • SURVIVE
      </p>
    </section>
  </main>

  <script>
    const loader = document.getElementById("loader");
    const artwork = document.getElementById("gameArtwork");

    function showPage() {
      document.body.classList.add("loaded");

      setTimeout(() => {
        loader.classList.add("hidden");
      }, 250);
    }

    function handleArtworkError() {
      console.error(
        "The image bg.jpeg could not be loaded. " +
        "Make sure bg.jpeg is in the same folder as index.html."
      );

      loader.querySelector(".loader-status").textContent =
        "ARTWORK COULD NOT BE LOADED";
    }

    artwork.addEventListener("load", () => {
      setTimeout(showPage, 1600);
    });

    artwork.addEventListener(
      "error",
      handleArtworkError
    );

    if (artwork.complete && artwork.naturalWidth > 0) {
      setTimeout(showPage, 1600);
    }

    window.setTimeout(() => {
      if (!document.body.classList.contains("loaded")) {
        showPage();
      }
    }, 4500);
  </script>
</body>
</html>
