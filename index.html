<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>d3li - Draw Your Card. Write Your Path.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030403;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dikey ekran kilitli konteyner */
        .phone-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Görselin en-boy oranını korumak için */
            background-image: url('bg.jpeg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Sarı Pop-up kutusu (Artık mobilde tam ortada) */
        .cyber-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 400px;
            background-color: rgba(5, 12, 5, 0.98);
            border: 2px solid #1f4d1f;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            border-radius: 6px;
            z-index: 10;
        }

        .log-line {
            color: #39ff14;
            font-size: 3.5vw;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .log-status { font-weight: bold; }

        .system-standby-content {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .standby-header {
            color: #ffcc00;
            font-weight: bold;
            font-size: 4vw;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .standby-desc {
            color: #88af88;
            font-size: 3vw;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .join-btn {
            background-color: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 12px 20px;
            font-size: 3.5vw;
            text-transform: uppercase;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Terminal kutusu, mobilde orta-üst kısımdadır -->
        <div class="cyber-modal" id="modal-box">
            <div id="terminal-logs">
                <div class="log-line" id="log1"><span>> INITIALIZING d3li...</span><span class="log-status">[OK]</span></div>
                <div class="log-line" id="log2"><span>> CONNECTING...</span><span class="log-status">[96/T]</span></div>
                <div class="log-line" id="log3"><span>> LOADING DATA...</span><span class="log-status">[100%]</span></div>
                <div class="log-line" id="log4"><span>> SECURING PORT...</span><span class="log-status">[OK]</span></div>
            </div>

            <div class="system-standby-content" id="standby-screen">
                <div class="standby-header">⚠️ CONNECTION LOST</div>
                <div class="standby-desc">Tarot servers are currently under active development. d3li has not opened its gates yet.</div>
                <button class="join-btn" onclick="window.open('https://discord.gg/d3licom', '_blank')">JOIN COMMUNITY</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const standbyScreen = document.getElementById('standby-screen');
            const terminalLogs = document.getElementById('terminal-logs');
            const modalBox = document.getElementById('modal-box');

            setTimeout(() => { document.getElementById('log1').style.display = 'flex'; }, 300);
            setTimeout(() => { document.getElementById('log2').style.display = 'flex'; }, 700);
            setTimeout(() => { document.getElementById('log3').style.display = 'flex'; }, 1100);
            setTimeout(() => { document.getElementById('log4').style.display = 'flex'; }, 1500);

            setTimeout(() => {
                terminalLogs.style.display = 'none';
                modalBox.style.borderColor = '#ffcc00';
                standbyScreen.style.display = 'block';
            }, 2500);
        });
    </script>
</body>
</html>
